<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Farm Reels — Govardhan Farm</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" href="assets/drone-4.jpg" type="image/jpeg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --dark:    #0a0a08;
      --cream:   #f2ede3;
      --accent:  #8b7355;
      --gold:    #c9a84c;
      --muted:   rgba(242,237,227,0.45);
      --border:  rgba(242,237,227,0.1);
      --font-serif: 'Playfair Display', Georgia, serif;
      --font-sans:  'Jost', sans-serif;
      --font-mono:  'DM Mono', monospace;
      --ease: cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--dark);
      color: var(--cream);
      font-family: var(--font-sans);
      overflow: hidden;
    }

    /* ════════════════════════════════════════
       TOP NAV BAR
    ════════════════════════════════════════ */
    .top-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      background: linear-gradient(to bottom, rgba(10,10,8,0.9) 0%, transparent 100%);
      pointer-events: none;
    }
    .top-bar > * { pointer-events: auto; }

    .top-logo {
      font-family: var(--font-serif);
      font-size: 1rem;
      font-weight: 400;
      color: var(--cream);
      text-decoration: none;
      letter-spacing: 0.02em;
    }

    .top-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 6px 12px 6px 8px;
      font-size: 0.72rem;
      color: var(--cream);
      backdrop-filter: blur(12px);
    }
    .user-avatar {
      width: 24px; height: 24px;
      background: linear-gradient(135deg, var(--accent), var(--gold));
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem; font-weight: 600; color: white;
    }
    .user-role {
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.8;
    }

    .btn-icon {
      width: 36px; height: 36px;
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      cursor: pointer;
      backdrop-filter: blur(12px);
      transition: background 0.2s, transform 0.2s;
    }
    .btn-icon:hover { background: rgba(255,255,255,0.14); transform: scale(1.05); }

    /* ════════════════════════════════════════
       REEL FEED
    ════════════════════════════════════════ */
    .feed {
      height: 100vh;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }
    .feed::-webkit-scrollbar { display: none; }

    /* ── Empty state ── */
    .feed-empty {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
      gap: 16px;
    }
    .feed-empty-icon { font-size: 3rem; }
    .feed-empty h3 {
      font-family: var(--font-serif);
      font-size: 1.5rem;
      font-weight: 400;
      color: var(--cream);
    }
    .feed-empty p { font-size: 0.85rem; color: var(--muted); max-width: 280px; line-height: 1.6; }

    /* ── Reel card ── */
    .reel {
      position: relative;
      width: 100vw;
      height: 100vh;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      background: #000;
      flex-shrink: 0;
      overflow: hidden;
    }

    /* Video element */
    .reel-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      cursor: pointer;
    }

    /* Gradient overlays */
    .reel-overlay-top {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 160px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 100%);
      pointer-events: none;
      z-index: 5;
    }
    .reel-overlay-bottom {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 300px;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%);
      pointer-events: none;
      z-index: 5;
    }

    /* Info block */
    .reel-info {
      position: absolute;
      bottom: 0; left: 0; right: 72px;
      padding: 24px 20px;
      z-index: 10;
    }
    .reel-uploader {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .uploader-avatar {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--gold));
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem; font-weight: 600; color: white;
      flex-shrink: 0;
    }
    .uploader-name {
      font-size: 0.85rem;
      font-weight: 500;
      color: white;
    }
    .uploader-date {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.5);
      font-family: var(--font-mono);
    }
    .reel-caption {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.9);
      line-height: 1.5;
      max-width: 280px;
    }

    /* Side actions */
    .reel-actions {
      position: absolute;
      right: 12px;
      bottom: 32px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .reel-action-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      background: none;
      border: none;
      color: white;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .reel-action-btn:hover { transform: scale(1.12); }
    .action-icon {
      width: 44px; height: 44px;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(8px);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
      border: 1px solid rgba(255,255,255,0.15);
      transition: background 0.2s;
    }
    .reel-action-btn:hover .action-icon { background: rgba(255,255,255,0.22); }
    .action-label {
      font-size: 0.65rem;
      color: rgba(255,255,255,0.75);
      letter-spacing: 0.06em;
    }

    /* Play/pause indicator */
    .play-indicator {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0);
      z-index: 20;
      font-size: 4rem;
      pointer-events: none;
      transition: transform 0.15s var(--ease), opacity 0.3s;
      opacity: 0;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
    }
    .play-indicator.show {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
    }

    /* Mute indicator */
    .mute-badge {
      position: absolute;
      top: 68px; right: 16px;
      z-index: 20;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 5px 12px;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.7);
      display: flex;
      align-items: center;
      gap: 6px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .mute-badge.show { opacity: 1; }

    /* Progress bar */
    .reel-progress {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: rgba(255,255,255,0.15);
      z-index: 15;
    }
    .reel-progress-fill {
      height: 100%;
      background: var(--gold);
      width: 0%;
      transition: width 0.1s linear;
    }

    /* Admin delete badge */
    .admin-delete-btn {
      position: absolute;
      top: 68px; left: 16px;
      z-index: 20;
      background: rgba(200,60,60,0.7);
      border: none;
      border-radius: 100px;
      padding: 6px 14px;
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: white;
      cursor: pointer;
      backdrop-filter: blur(8px);
      display: none;
      transition: background 0.2s;
    }
    .admin-delete-btn:hover { background: rgba(200,60,60,0.95); }

    /* ════════════════════════════════════════
       SCROLL NAV DOTS
    ════════════════════════════════════════ */
    .nav-dots {
      position: fixed;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 90;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .nav-dot {
      width: 4px; height: 4px;
      background: rgba(255,255,255,0.3);
      border-radius: 50%;
      transition: all 0.3s;
      cursor: pointer;
    }
    .nav-dot.active {
      background: var(--gold);
      height: 16px;
      border-radius: 3px;
    }

    /* ════════════════════════════════════════
       UPLOAD MODAL
    ════════════════════════════════════════ */
    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s var(--ease);
    }
    .modal-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .modal {
      width: 100%;
      max-width: 520px;
      background: #141412;
      border: 1px solid var(--border);
      border-radius: 24px 24px 0 0;
      padding: 32px 28px 40px;
      transform: translateY(100%);
      transition: transform 0.4s var(--ease);
    }
    .modal-overlay.open .modal { transform: translateY(0); }

    .modal-handle {
      width: 40px; height: 4px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
      margin: 0 auto 28px;
    }

    .modal-title {
      font-family: var(--font-serif);
      font-size: 1.5rem;
      font-weight: 400;
      margin-bottom: 6px;
    }
    .modal-sub {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 28px;
    }

    /* Upload dropzone */
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: 16px;
      padding: 40px 24px;
      text-align: center;
      cursor: pointer;
      position: relative;
      transition: border-color 0.25s, background 0.25s;
      margin-bottom: 20px;
    }
    .upload-zone:hover, .upload-zone.dragover {
      border-color: rgba(201,168,76,0.4);
      background: rgba(201,168,76,0.04);
    }
    .upload-zone input[type="file"] {
      position: absolute; inset: 0;
      opacity: 0; cursor: pointer;
      width: 100%; height: 100%;
    }
    .upload-zone-icon { font-size: 2rem; margin-bottom: 12px; display: block; }
    .upload-zone h4 {
      font-family: var(--font-serif);
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--cream);
      margin-bottom: 6px;
    }
    .upload-zone p { font-size: 0.75rem; color: var(--muted); }

    /* Video preview */
    .video-preview-wrap {
      display: none;
      border-radius: 12px;
      overflow: hidden;
      aspect-ratio: 9/16;
      max-height: 240px;
      margin: 0 auto 20px;
      position: relative;
      background: #000;
    }
    .video-preview-wrap.show { display: block; }
    .video-preview-wrap video {
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .preview-duration {
      position: absolute;
      bottom: 8px; right: 8px;
      background: rgba(0,0,0,0.65);
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 0.7rem;
      font-family: var(--font-mono);
      color: white;
    }
    .preview-duration.over { color: #e88; }

    /* Caption input */
    .modal-input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 13px 16px;
      font-family: var(--font-sans);
      font-size: 0.9rem;
      color: var(--cream);
      outline: none;
      transition: border-color 0.25s;
      caret-color: var(--gold);
      margin-bottom: 16px;
    }
    .modal-input::placeholder { color: rgba(242,237,227,0.2); }
    .modal-input:focus { border-color: rgba(201,168,76,0.4); }

    /* Upload progress */
    .upload-bar {
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      margin-bottom: 16px;
      display: none;
    }
    .upload-bar.show { display: block; }
    .upload-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--gold));
      border-radius: 2px;
      width: 0%;
      transition: width 0.4s var(--ease);
    }

    /* Modal buttons */
    .modal-btn-row {
      display: flex;
      gap: 12px;
    }
    .btn-cancel-modal {
      flex: 1;
      padding: 13px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 12px;
      font-family: var(--font-sans);
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-cancel-modal:hover { background: rgba(255,255,255,0.1); }

    .btn-post {
      flex: 2;
      padding: 13px;
      background: linear-gradient(135deg, var(--accent), #7a6348);
      border: none;
      border-radius: 12px;
      font-family: var(--font-sans);
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: white;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      position: relative;
      overflow: hidden;
    }
    .btn-post::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
      pointer-events: none;
    }
    .btn-post:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
    .btn-post:disabled { opacity: 0.4; cursor: not-allowed; }

    .modal-status {
      font-size: 0.78rem;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 14px;
      display: none;
      line-height: 1.5;
    }
    .modal-status.error   { display: block; background: rgba(224,92,92,0.12); color: #e88; border: 1px solid rgba(224,92,92,0.2); }
    .modal-status.loading { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.05); color: var(--muted); border: 1px solid var(--border); }

    /* ════════════════════════════════════════
       ADMIN PANEL (slide-in from right)
    ════════════════════════════════════════ */
    .admin-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .admin-overlay.open { opacity: 1; pointer-events: auto; }

    .admin-panel {
      position: absolute;
      top: 0; right: 0; bottom: 0;
      width: 100%;
      max-width: 380px;
      background: #111110;
      border-left: 1px solid var(--border);
      transform: translateX(100%);
      transition: transform 0.4s var(--ease);
      overflow-y: auto;
      padding: 28px 24px 40px;
    }
    .admin-panel::-webkit-scrollbar { display: none; }
    .admin-overlay.open .admin-panel { transform: translateX(0); }

    .admin-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }
    .admin-panel-title {
      font-family: var(--font-serif);
      font-size: 1.3rem;
      font-weight: 400;
    }
    .btn-close-admin {
      background: none; border: none;
      color: var(--muted); font-size: 1.2rem;
      cursor: pointer; transition: color 0.2s;
    }
    .btn-close-admin:hover { color: var(--cream); }

    .admin-section-title {
      font-size: 0.62rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    /* User cards */
    .user-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 32px; }

    .user-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 14px;
      transition: background 0.2s;
    }
    .user-card-avatar {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--accent), #6b5740);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; font-weight: 600; color: white;
      flex-shrink: 0;
    }
    .user-card-info { flex: 1; min-width: 0; }
    .user-card-name {
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--cream);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .user-card-phone {
      font-size: 0.72rem;
      color: var(--muted);
      font-family: var(--font-mono);
      margin-top: 2px;
    }
    .role-badge {
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 100px;
      font-weight: 500;
    }
    .role-badge.pending  { background: rgba(201,168,76,0.15); color: var(--gold); border: 1px solid rgba(201,168,76,0.25); }
    .role-badge.verified { background: rgba(76,175,125,0.15); color: #7ec; border: 1px solid rgba(76,175,125,0.25); }
    .role-badge.admin    { background: rgba(139,115,85,0.2); color: #c9a84c; border: 1px solid rgba(139,115,85,0.3); }

    .user-card-actions { display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }

    .btn-approve {
      padding: 5px 12px;
      background: rgba(76,175,125,0.15);
      border: 1px solid rgba(76,175,125,0.3);
      border-radius: 8px;
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #7ec;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .btn-approve:hover { background: rgba(76,175,125,0.28); }

    .btn-revoke {
      padding: 5px 12px;
      background: rgba(224,92,92,0.1);
      border: 1px solid rgba(224,92,92,0.25);
      border-radius: 8px;
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #e88;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .btn-revoke:hover { background: rgba(224,92,92,0.22); }

    .empty-list {
      font-size: 0.82rem;
      color: var(--muted);
      text-align: center;
      padding: 24px;
      font-style: italic;
    }

    /* Logout button */
    .btn-logout {
      width: 100%;
      padding: 13px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 12px;
      font-family: var(--font-sans);
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .btn-logout:hover { background: rgba(224,92,92,0.1); color: #e88; border-color: rgba(224,92,92,0.2); }

    /* ── Spinner ── */
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.15);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      z-index: 999;
      background: rgba(20,20,18,0.95);
      border: 1px solid var(--border);
      color: var(--cream);
      padding: 12px 22px;
      border-radius: 100px;
      font-size: 0.8rem;
      white-space: nowrap;
      opacity: 0;
      transition: transform 0.4s var(--ease), opacity 0.4s;
      pointer-events: none;
      backdrop-filter: blur(12px);
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* ── Loading screen ── */
    .loading-screen {
      position: fixed; inset: 0; z-index: 500;
      background: var(--dark);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      transition: opacity 0.5s;
    }
    .loading-screen.hidden { opacity: 0; pointer-events: none; }
    .loading-screen .brand-serif {
      font-family: var(--font-serif);
      font-size: 1.2rem;
      color: var(--cream);
      opacity: 0.5;
    }

    /* Mobile fine-tuning */
    @media (max-width: 480px) {
      .reel-info { right: 60px; }
      .reel-actions { right: 8px; }
      .admin-panel { max-width: 100%; }
    }
  </style>
</head>
<body>

  <!-- Loading screen -->
  <div class="loading-screen" id="loading-screen">
    <div class="spinner" style="width:28px;height:28px;border-width:3px;"></div>
    <span class="brand-serif">Govardhan Farm</span>
  </div>

  <!-- Top bar -->
  <div class="top-bar">
    <a href="index.html" class="top-logo">Govardhan Farm</a>
    <div class="top-right">
      <div class="user-chip" id="user-chip">
        <div class="user-avatar" id="user-avatar">?</div>
        <div>
          <div id="user-name-display" style="font-size:0.78rem;">—</div>
          <div class="user-role" id="user-role-display">—</div>
        </div>
      </div>
      <!-- Admin wrench icon (only visible to admin) -->
      <div class="btn-icon" id="btn-admin-panel" style="display:none;" title="Admin Panel">⚙️</div>
      <!-- Upload button (verified + admin) -->
      <div class="btn-icon" id="btn-upload" style="display:none;" title="Upload Reel">＋</div>
    </div>
  </div>

  <!-- Mute badge -->
  <div class="mute-badge" id="mute-badge">🔇 Tap to unmute</div>

  <!-- Nav dots -->
  <div class="nav-dots" id="nav-dots"></div>

  <!-- Feed -->
  <div class="feed" id="feed"></div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- ════════════════════════════════════════
       UPLOAD MODAL
  ════════════════════════════════════════ -->
  <div class="modal-overlay" id="upload-modal">
    <div class="modal">
      <div class="modal-handle"></div>
      <h3 class="modal-title">Share a Reel</h3>
      <p class="modal-sub">30–40 second videos of life at the farm.</p>

      <!-- Dropzone -->
      <div class="upload-zone" id="upload-zone">
        <input type="file" id="video-input" accept="video/mp4,video/webm,video/quicktime" />
        <span class="upload-zone-icon">🎬</span>
        <h4>Drop your video here</h4>
        <p>MP4 · MOV · WEBM &nbsp;·&nbsp; Max 80 MB &nbsp;·&nbsp; 30–40 seconds</p>
      </div>

      <!-- Video preview -->
      <div class="video-preview-wrap" id="video-preview-wrap">
        <video id="video-preview" muted playsinline loop></video>
        <span class="preview-duration" id="preview-duration">0s</span>
      </div>

      <!-- Caption -->
      <input type="text" class="modal-input" id="caption-input"
             placeholder="Add a caption… (optional)" maxlength="100" />

      <!-- Progress bar -->
      <div class="upload-bar" id="upload-bar">
        <div class="upload-bar-fill" id="upload-bar-fill"></div>
      </div>

      <!-- Status -->
      <div class="modal-status" id="modal-status"></div>

      <div class="modal-btn-row">
        <button class="btn-cancel-modal" id="btn-cancel-upload">Cancel</button>
        <button class="btn-post" id="btn-post-reel" disabled>Post Reel ✦</button>
      </div>
    </div>
  </div>

  <!-- ════════════════════════════════════════
       ADMIN PANEL
  ════════════════════════════════════════ -->
  <div class="admin-overlay" id="admin-overlay">
    <div class="admin-panel">
      <div class="admin-panel-header">
        <h3 class="admin-panel-title">Admin Panel</h3>
        <button class="btn-close-admin" id="btn-close-admin">✕</button>
      </div>

      <!-- Pending users -->
      <p class="admin-section-title">Pending Approval <span id="pending-count"></span></p>
      <div class="user-list" id="pending-list">
        <p class="empty-list">No pending users.</p>
      </div>

      <!-- All users -->
      <p class="admin-section-title">All Members</p>
      <div class="user-list" id="all-users-list">
        <p class="empty-list">Loading…</p>
      </div>

      <button class="btn-logout" id="btn-logout">Sign Out</button>
    </div>
  </div>

  <script>
  /* ══════════════════════════════════════════════
     GOVARDHAN FARM — FARM REELS
     Paste your credentials:
  ══════════════════════════════════════════════ */
  const SUPABASE_URL      = 'YOUR_SUPABASE_URL';
  const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';

  const MAX_VIDEO_MB  = 80;
  const MIN_DURATION  = 28;   // seconds (a little lenient)
  const MAX_DURATION  = 42;   // seconds

  /* ════════════════════════════════════════════ */

  (function () {

    /* ── Session check ── */
    const session = getSession();
    if (!session) {
      window.location.href = 'login.html';
      return;
    }

    const isAdmin   = session.role === 'admin';
    const canUpload = true; // All logged-in users can upload
    let videos       = [];
    let currentIndex = 0;
    let isMuted      = true;
    let pendingVideoFile = null;
    let lastUploadTime   = 0;

    /* ── DOM refs ── */
    const feed           = document.getElementById('feed');
    const navDots        = document.getElementById('nav-dots');
    const uploadModal    = document.getElementById('upload-modal');
    const adminOverlay   = document.getElementById('admin-overlay');
    const btnUpload      = document.getElementById('btn-upload');
    const btnAdminPanel  = document.getElementById('btn-admin-panel');
    const btnPostReel    = document.getElementById('btn-post-reel');
    const btnCancelUpload= document.getElementById('btn-cancel-upload');
    const btnCloseAdmin  = document.getElementById('btn-close-admin');
    const btnLogout      = document.getElementById('btn-logout');
    const videoInput     = document.getElementById('video-input');
    const uploadZone     = document.getElementById('upload-zone');
    const videoPreview   = document.getElementById('video-preview');
    const previewWrap    = document.getElementById('video-preview-wrap');
    const previewDuration= document.getElementById('preview-duration');
    const captionInput   = document.getElementById('caption-input');
    const uploadBar      = document.getElementById('upload-bar');
    const uploadBarFill  = document.getElementById('upload-bar-fill');
    const modalStatus    = document.getElementById('modal-status');
    const muteBadge      = document.getElementById('mute-badge');
    const toast          = document.getElementById('toast');
    const loadingScreen  = document.getElementById('loading-screen');

    /* ── Init UI ── */
    document.getElementById('user-name-display').textContent = session.name || 'Member';
    document.getElementById('user-role-display').textContent = session.role;
    document.getElementById('user-avatar').textContent = (session.name || 'M')[0].toUpperCase();
    if (canUpload)  btnUpload.style.display = 'flex';
    if (isAdmin)    btnAdminPanel.style.display = 'flex';

    /* ── Load feed ── */
    loadVideos();

    async function loadVideos() {
      try {
        const res = await fetch(
          `${SUPABASE_URL}/rest/v1/farm_videos?order=created_at.desc&limit=50`,
          { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` } }
        );
        if (!res.ok) throw new Error();
        videos = await res.json();
      } catch {
        videos = [];
      }

      hideLoading();
      renderFeed();
    }

    function hideLoading() {
      loadingScreen.classList.add('hidden');
      setTimeout(() => loadingScreen.style.display = 'none', 600);
    }

    /* ════════════════════════
       RENDER FEED
    ════════════════════════ */
    function renderFeed() {
      feed.innerHTML = '';
      navDots.innerHTML = '';

      if (!videos.length) {
        feed.innerHTML = `
          <div class="feed-empty">
            <span class="feed-empty-icon">🌾</span>
            <h3>No reels yet</h3>
            <p>${canUpload ? 'Be the first to upload a farm reel!' : 'Check back soon — the farm team will post videos here.'}</p>
          </div>`;
        return;
      }

      videos.forEach((v, i) => {
        feed.appendChild(makeReel(v, i));
        const dot = document.createElement('div');
        dot.className = 'nav-dot' + (i === 0 ? ' active' : '');
        dot.addEventListener('click', () => scrollToIndex(i));
        navDots.appendChild(dot);
      });

      // Play first reel
      setTimeout(() => playReel(0), 400);

      // Scroll observer
      const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const idx = parseInt(entry.target.dataset.index);
            currentIndex = idx;
            updateDots(idx);
            playReel(idx);
          } else {
            const video = entry.target.querySelector('.reel-video');
            if (video) { video.pause(); video.currentTime = 0; }
          }
        });
      }, { threshold: 0.6 });

      document.querySelectorAll('.reel').forEach(r => observer.observe(r));
    }

    function makeReel(v, i) {
      const reel = document.createElement('div');
      reel.className = 'reel';
      reel.dataset.index = i;

      const nameInitial = (v.uploader_name || '?')[0].toUpperCase();
      const dateStr = new Date(v.created_at).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });

      reel.innerHTML = `
        <video class="reel-video" src="${esc(v.video_url)}" loop playsinline muted></video>
        <div class="reel-overlay-top"></div>
        <div class="reel-overlay-bottom"></div>
        <div class="reel-info">
          <div class="reel-uploader">
            <div class="uploader-avatar">${nameInitial}</div>
            <div>
              <div class="uploader-name">${esc(v.uploader_name || 'Farm Member')}</div>
              <div class="uploader-date">${dateStr}</div>
            </div>
          </div>
          ${v.caption ? `<p class="reel-caption">${esc(v.caption)}</p>` : ''}
        </div>
        <div class="reel-actions">
          <button class="reel-action-btn mute-btn" title="Toggle mute">
            <div class="action-icon" id="mute-icon-${i}">🔇</div>
            <span class="action-label">Sound</span>
          </button>
        </div>
        <div class="play-indicator" id="play-indicator-${i}">⏸</div>
        <div class="reel-progress"><div class="reel-progress-fill" id="progress-${i}"></div></div>
        ${isAdmin ? `<button class="admin-delete-btn" data-id="${v.id}" data-video-path="${esc(v.video_url)}" style="display:flex;">🗑 Delete</button>` : ''}
      `;

      // Click to play/pause
      const video = reel.querySelector('.reel-video');
      const indicator = reel.querySelector('.play-indicator');
      const progressFill = reel.querySelector('.reel-progress-fill');

      reel.addEventListener('click', e => {
        if (e.target.classList.contains('mute-btn') || e.target.closest('.mute-btn')) return;
        if (e.target.classList.contains('admin-delete-btn')) return;
        if (video.paused) {
          video.play();
          indicator.textContent = '▶';
        } else {
          video.pause();
          indicator.textContent = '⏸';
        }
        indicator.classList.add('show');
        setTimeout(() => indicator.classList.remove('show'), 900);
      });

      // Mute toggle
      reel.querySelector('.mute-btn').addEventListener('click', e => {
        e.stopPropagation();
        toggleMute(i, video);
      });

      // Progress bar
      video.addEventListener('timeupdate', () => {
        if (video.duration) {
          progressFill.style.width = (video.currentTime / video.duration * 100) + '%';
        }
      });

      // Admin delete
      if (isAdmin) {
        reel.querySelector('.admin-delete-btn').addEventListener('click', async e => {
          e.stopPropagation();
          if (!confirm('Delete this reel? This cannot be undone.')) return;
          await deleteReel(v.id);
        });
      }

      return reel;
    }

    function playReel(idx) {
      document.querySelectorAll('.reel-video').forEach((v, i) => {
        if (i === idx) {
          v.muted = isMuted;
          v.play().catch(() => {});
          document.getElementById(`mute-icon-${i}`).textContent = isMuted ? '🔇' : '🔊';
        } else {
          v.pause();
          v.currentTime = 0;
        }
      });
      // Show mute hint on first load
      if (isMuted) {
        muteBadge.classList.add('show');
        setTimeout(() => muteBadge.classList.remove('show'), 3000);
      }
    }

    function toggleMute(idx, videoEl) {
      isMuted = !isMuted;
      document.querySelectorAll('.reel-video').forEach(v => { v.muted = isMuted; });
      document.querySelectorAll('.reel-action-btn.mute-btn .action-icon').forEach((ic, i) => {
        ic.textContent = isMuted ? '🔇' : '🔊';
      });
      if (!isMuted) muteBadge.classList.remove('show');
    }

    function updateDots(idx) {
      document.querySelectorAll('.nav-dot').forEach((d, i) => {
        d.classList.toggle('active', i === idx);
      });
    }

    function scrollToIndex(idx) {
      const reels = document.querySelectorAll('.reel');
      if (reels[idx]) reels[idx].scrollIntoView({ behavior: 'smooth' });
    }

    /* ════════════════════════
       UPLOAD FLOW
    ════════════════════════ */
    btnUpload.addEventListener('click', () => {
      uploadModal.classList.add('open');
      resetUploadModal();
    });

    btnCancelUpload.addEventListener('click', closeUploadModal);
    uploadModal.addEventListener('click', e => {
      if (e.target === uploadModal) closeUploadModal();
    });

    function closeUploadModal() {
      uploadModal.classList.remove('open');
      resetUploadModal();
    }

    function resetUploadModal() {
      pendingVideoFile = null;
      videoInput.value = '';
      captionInput.value = '';
      videoPreview.src = '';
      previewWrap.classList.remove('show');
      uploadZone.style.display = 'block';
      uploadBar.classList.remove('show');
      uploadBarFill.style.width = '0%';
      btnPostReel.disabled = true;
      hideModalStatus();
    }

    // Drag & drop
    uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
    uploadZone.addEventListener('drop', e => {
      e.preventDefault(); uploadZone.classList.remove('dragover');
      if (e.dataTransfer.files[0]) handleVideoFile(e.dataTransfer.files[0]);
    });
    videoInput.addEventListener('change', () => {
      if (videoInput.files[0]) handleVideoFile(videoInput.files[0]);
    });

    function handleVideoFile(file) {
      const allowedTypes = ['video/mp4','video/webm','video/quicktime'];
      if (!allowedTypes.includes(file.type)) {
        return showModalStatus('error', 'Only MP4, MOV, or WEBM videos are allowed.');
      }
      if (file.size > MAX_VIDEO_MB * 1024 * 1024) {
        return showModalStatus('error', `Video too large — max ${MAX_VIDEO_MB} MB.`);
      }

      const url = URL.createObjectURL(file);
      videoPreview.src = url;
      videoPreview.load();

      videoPreview.onloadedmetadata = () => {
        const dur = Math.round(videoPreview.duration);
        previewDuration.textContent = dur + 's';
        const overLimit = videoPreview.duration > MAX_DURATION;
        const underLimit = videoPreview.duration < MIN_DURATION;
        previewDuration.classList.toggle('over', overLimit || underLimit);

        if (overLimit) {
          showModalStatus('error', `Video is ${dur}s — please keep it under ${MAX_DURATION} seconds.`);
          btnPostReel.disabled = true;
        } else if (underLimit) {
          showModalStatus('error', `Video is ${dur}s — minimum length is ${MIN_DURATION} seconds.`);
          btnPostReel.disabled = true;
        } else {
          hideModalStatus();
          btnPostReel.disabled = false;
        }
      };

      pendingVideoFile = file;
      uploadZone.style.display = 'none';
      previewWrap.classList.add('show');
      videoPreview.play().catch(() => {});
    }

    btnPostReel.addEventListener('click', uploadReel);

    async function uploadReel() {
      if (!pendingVideoFile) return;

      const now = Date.now();
      if (now - lastUploadTime < 15000) {
        return showModalStatus('error', 'Please wait a moment before uploading again.');
      }

      const caption = captionInput.value.trim() || '';
      btnPostReel.disabled = true;
      showModalStatus('loading', 'Uploading video…');
      uploadBar.classList.add('show');

      try {
        // Upload to Supabase Storage
        const ext      = pendingVideoFile.name.split('.').pop().toLowerCase() || 'mp4';
        const filename = `reel_${Date.now()}.${ext}`;
        const uploadURL= `${SUPABASE_URL}/storage/v1/object/farm-reels/${filename}`;

        // Simulate progress (Storage API doesn't expose progress)
        let fakeProgress = 0;
        const progressInterval = setInterval(() => {
          fakeProgress = Math.min(fakeProgress + Math.random() * 12, 88);
          uploadBarFill.style.width = fakeProgress + '%';
        }, 300);

        const uploadRes = await fetch(uploadURL, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
            'Content-Type':  pendingVideoFile.type,
            'x-upsert':      'true',
          },
          body: pendingVideoFile,
        });

        clearInterval(progressInterval);
        uploadBarFill.style.width = '92%';

        if (!uploadRes.ok) {
          const err = await uploadRes.text();
          throw new Error(`Upload failed: ${err}`);
        }

        const videoUrl = `${SUPABASE_URL}/storage/v1/object/public/farm-reels/${filename}`;

        // Insert into DB
        showModalStatus('loading', 'Saving to feed…');
        const dbRes = await fetch(`${SUPABASE_URL}/rest/v1/farm_videos`, {
          method: 'POST',
          headers: {
            'apikey':        SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
            'Content-Type':  'application/json',
            'Prefer':        'return=representation',
          },
          body: JSON.stringify({
            video_url:     videoUrl,
            caption:       caption || null,
            uploader_id:   session.phone,
            uploader_name: session.name,
          }),
        });

        if (!dbRes.ok) throw new Error('Could not save to database.');
        const saved = await dbRes.json();
        const row   = Array.isArray(saved) ? saved[0] : saved;

        uploadBarFill.style.width = '100%';
        lastUploadTime = Date.now();

        setTimeout(() => {
          closeUploadModal();
          videos.unshift(row);
          renderFeed();
          showToast('🎬 Reel posted!');
        }, 500);

      } catch (err) {
        console.error('Upload error:', err.message);
        showModalStatus('error', err.message || 'Upload failed. Please try again.');
        btnPostReel.disabled = false;
        uploadBarFill.style.width = '0%';
      }
    }

    /* ════════════════════════
       DELETE REEL (admin)
    ════════════════════════ */
    async function deleteReel(id) {
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/farm_videos?id=eq.${id}`, {
          method: 'DELETE',
          headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` },
        });
        if (!res.ok) throw new Error();
        videos = videos.filter(v => v.id !== id);
        renderFeed();
        showToast('Reel deleted.');
      } catch {
        showToast('Could not delete reel.');
      }
    }

    /* ════════════════════════
       ADMIN PANEL
    ════════════════════════ */
    if (isAdmin) {
      btnAdminPanel.addEventListener('click', () => {
        adminOverlay.classList.add('open');
        loadUsers();
      });
    }

    btnCloseAdmin.addEventListener('click', () => adminOverlay.classList.remove('open'));
    adminOverlay.addEventListener('click', e => {
      if (e.target === adminOverlay) adminOverlay.classList.remove('open');
    });

    async function loadUsers() {
      const pendingList   = document.getElementById('pending-list');
      const allUsersList  = document.getElementById('all-users-list');
      const pendingCount  = document.getElementById('pending-count');
      pendingList.innerHTML  = '<p class="empty-list">Loading…</p>';
      allUsersList.innerHTML = '<p class="empty-list">Loading…</p>';

      try {
        const res = await fetch(
          `${SUPABASE_URL}/rest/v1/profiles?order=created_at.desc`,
          { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` } }
        );
        const users = await res.json();

        const pending  = users.filter(u => u.role === 'pending');
        const everyone = users.filter(u => u.phone !== session.phone);

        pendingCount.textContent = pending.length ? `(${pending.length})` : '';
        pendingList.innerHTML  = pending.length  ? '' : '<p class="empty-list">No pending users 🎉</p>';
        allUsersList.innerHTML = everyone.length ? '' : '<p class="empty-list">No other members yet.</p>';

        pending.forEach(u  => pendingList.appendChild(makeUserCard(u, true)));
        everyone.forEach(u => allUsersList.appendChild(makeUserCard(u, false)));

      } catch {
        pendingList.innerHTML  = '<p class="empty-list">Error loading users.</p>';
        allUsersList.innerHTML = '<p class="empty-list">Error loading users.</p>';
      }
    }

    function makeUserCard(u, showApprove) {
      const card = document.createElement('div');
      card.className = 'user-card';
      const initial = (u.full_name || '?')[0].toUpperCase();
      const phone   = '+' + u.phone;

      card.innerHTML = `
        <div class="user-card-avatar">${initial}</div>
        <div class="user-card-info">
          <div class="user-card-name">${esc(u.full_name || '—')}</div>
          <div class="user-card-phone">${esc(phone)}</div>
        </div>
        <div class="user-card-actions">
          <span class="role-badge ${u.role}">${u.role}</span>
          ${showApprove ? `<button class="btn-approve" data-phone="${u.phone}">✓ Approve</button>` : ''}
          ${u.role === 'verified' ? `<button class="btn-revoke" data-phone="${u.phone}">✕ Revoke</button>` : ''}
        </div>`;

      if (showApprove) {
        card.querySelector('.btn-approve').addEventListener('click', () => updateRole(u.phone, 'verified', card));
      }
      if (u.role === 'verified') {
        card.querySelector('.btn-revoke').addEventListener('click', () => updateRole(u.phone, 'pending', card));
      }

      return card;
    }

    async function updateRole(phone, newRole, card) {
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/profiles?phone=eq.${phone}`, {
          method: 'PATCH',
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ role: newRole }),
        });
        if (!res.ok) throw new Error();
        showToast(newRole === 'verified' ? '✓ User approved!' : 'Access revoked.');
        loadUsers(); // Refresh list
      } catch {
        showToast('Could not update user role.');
      }
    }

    /* ════════════════════════
       LOGOUT
    ════════════════════════ */
    btnLogout.addEventListener('click', () => {
      localStorage.removeItem('gf_session');
      window.location.href = 'login.html';
    });

    /* ════════════════════════
       UTILITIES
    ════════════════════════ */
    function showModalStatus(type, msg) {
      modalStatus.className = `modal-status ${type}`;
      modalStatus.style.display = type === 'loading' ? 'flex' : 'block';
      modalStatus.innerHTML = type === 'loading'
        ? `<span class="spinner"></span>${msg}`
        : msg;
    }
    function hideModalStatus() { modalStatus.style.display = 'none'; }

    let toastTimer;
    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function getSession() {
      try {
        const s = JSON.parse(localStorage.getItem('gf_session'));
        if (!s) return null;
        if (Date.now() - s.loginTime > 90 * 24 * 60 * 60 * 1000) {
          localStorage.removeItem('gf_session');
          return null;
        }
        return s;
      } catch { return null; }
    }

    function esc(str) {
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

  })();
  </script>
